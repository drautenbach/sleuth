{{template "template-start.html" .}}

    <span class="right"><wa-button href="categories/new" style="font-size: 10px;"><wa-icon name="plus"></wa-icon></wa-button></span>
    <h2>DNS Categories</h2>
    <table border="1" cellspacing="0" cellpadding="0">
        <thead>
            <tr>
                <th></th>
                <th>ID</th>
                <th>Category</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            {{range .model.Categories}}
            <tr>
                <td><a href="category/{{.CategoryId}}"><wa-icon name="pencil-square"></wa-icon></a></td>
                <td><b>{{.CategoryId}}</b></td>
                <td><b>{{.CategoryName}}</b></td>
                <td><wa-switch size="small" disabled {{if .Enabled}}checked{{end}}></wa-switch></td>
            </tr>
                {{range .SubCategories}}
                        <tr>
                        <td><a href="category/{{.CategoryId}}"><wa-icon name="pencil-square"></wa-icon></a></td>
                        <td>&nbsp;&nbsp;{{.CategoryId}}</td>
                        <td>&nbsp;&nbsp;{{.CategoryName}}</td>
                        <td><wa-switch size="small" disabled {{if .Enabled}}checked{{end}}></wa-switch></td>
                    </tr>
                {{end}}
            {{end}}
        </tbody>
    </table>


{{template "template-end.html" .}}
