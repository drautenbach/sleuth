{{template "template-start.html" .}}

    <form method="post">
        <div class="form-layout">
            <h3>{{.title}}</h3>
                <div class="form-group">
                    <label for="name">Configuration</label>
                    <input type="text" id="name" name="name" value="{{.model.Profile.Name}}" required/>
                </div>

                <div class="form-group">
                    <label>Type</label>
                    <wa-select name="type" value="{{.model.Profile.Type}}" required>
                        {{range .model.Types}}
                            <wa-option value="{{.Value}}" {{if eq .Value $.model.Profile.Type}}selected{{end}}>{{.Text}}</wa-option>
                        {{end}}
                    <wa-select>
                </div>

                <div class="form-group">
                    <label for="address">Address</label>
                    <input type="text" id="address" name="address" value="{{.model.Profile.Address}}" required/>
                </div>

                
                <p><div class="error-message">{{.error}}</div></p>
                <div class="button-group">
                    <wa-button variant="primary" type="submit" name="action" value="{{.action}}"><wa-icon name="save"></wa-icon> {{if eq $.action "create"}}Create{{else}}Save{{end}}</wa-button>
                    <wa-button variant="default" href="../dnsconfigurations" outline><wa-icon name="arrow-left"></wa-icon> Cancel</wa-button>

                    {{if eq $.action "edit"}}
                        <span class="right">
                            <wa-button href="../dnsconfigurations/delete/{{.model.Profile.ProfileId}}" variant="danger" outline><wa-icon name="xmark"></wa-icon> Delete</wa-button>
                        </span>
                    {{end}}
                </div>                    
        </div>
    </form>

    <style>
        .hidden {
            display: none
        }
    </style>
    <script>
        document.onreadystatechange = function () {
        if (document.readyState === "complete") {
                source_external.addEventListener('sl-change', function() {
                      divSource.className = source_external.checked ? 'form-group' : 'form-group hidden';
                      divSchedule.className = source_external.checked ? 'form-group' : 'form-group hidden';
                      source.required = source_external.checked;
                      schedule.required = source_external.checked;
                })
            }
        }
    </script>


{{template "template-end.html" .}}
