{{template "template-start.html" .}}

    <span class="right"><wa-icon-button name="plus-square" href="categories/new"></wa-icon></span>
    <h2>DNS Categories</h2>
    <table border="1" cellspacing="0" cellpadding="0">
        <thead>
            <tr>
                <th></th>
                <th>Category</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            {{range .model.Categories}}
            <tr>
                <td><a href="category/{{.CategoryId}}"><wa-icon name="pencil-square"></wa-icon></a></td>
                <td>{{.CategoryName}}</td>
                <td><wa-switch size="small" disabled {{if .Enabled}}checked{{end}}></wa-switch></td>
            </tr>
            {{end}}
        </tbody>
    </table>


{{template "template-end.html" .}}
