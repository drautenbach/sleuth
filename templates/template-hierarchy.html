{{if (gt (len .nav.hierarchy) 0)}} 
        <wa-breadcrumb>  
        {{range .nav.hierarchy}}
                <wa-breadcrumb-item {{if .href}}href="{{.href}}"{{end}}>
                    {{if .title}}{{.title}}{{else}}{{.name}}{{end}}
                </wa-breadcrumb-item>
        {{end}}
    </wa-breadcrumb>
{{end}}
