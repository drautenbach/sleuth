{{template "template-start.html" .}}

    <form method="post">
        <div class="form-layout">
            <h3>{{.title}}</h3>
                <div class="form-group">
                    <label for="rolename">Key</label>
                    <input type="text" name="Key" value="{{.model.Key}}" />
                </div>

                <div class="form-group">
                    <label for="enabled">Enabled</label>
                    <wa-switch id="enabled" name="Enabled" {{if .model.Enabled}}checked{{end}}>Enabled</wa-switch>
                </div>

                <table border="1">
                    <tr>
                        <th>Service</th>
                        <th>Enabled</th>
                    </tr>
                    <tbody>
                        <tr>
                            <td>Website Categorization</td>
                            <td><wa-switch id="WebSiteCategorization" name="WebSiteCategorization" {{if .model.Services.WebSiteCategorization}}checked{{end}}>Enabled</wa-switch></td>
                        </tr>
                    </tbody>
                </table>
                
                <p><label class="error-message">{{.error}}</label></p>
                <div class="button-group">
                    <wa-button variant="primary" type="submit"><wa-icon name="save"></wa-icon>Save</wa-button>
                    <wa-button variant="default" href="../api" outline><wa-icon name="arrow-left"></wa-icon> Cancel</wa-button>                    
                </div>                    
        </div>
    </form>


{{template "template-end.html" .}}
