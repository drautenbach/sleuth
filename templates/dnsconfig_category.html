{{template "template-start.html" .}}

    <form method="post">
        <div class="form-layout">
            <h3>{{.title}}</h3>
                <div class="form-group">
                    <label for="rolename">Category</label>
                    <input type="text" name="categoryname" value="{{.model.Category.CategoryName}}" />
                </div>

                <div class="form-group">
                    <label for="enabled">Enabled</label>
                    <wa-switch id="enabled" name="enabled" {{if .model.Category.Enabled}}checked{{end}}>Enabled</wa-switch>
                </div>
                
                <p><label class="error-message">{{.error}}</label></p>
                <div class="button-group">
                    <wa-button variant="primary" type="submit" name="action" value="{{.action}}"><wa-icon name="save" slot="prefix"></wa-icon>{{if eq $.action "create"}}Create{{else}}Save{{end}}</wa-button>
                    <wa-button variant="default" href="../categories" outline><wa-icon name="arrow-return-left" slot="prefix"></wa-icon>Cancel</wa-button>

                    {{if eq $.action "edit"}}
                        <span class="right">
                            <wa-button href="../categories/delete/{{.model.Category.CategoryId}}" variant="danger" outline><wa-icon name="person-dash" slot="prefix"></wa-icon>Delete</wa-button>
                        </span>
                    {{end}}
                </div>                    
        </div>
    </form>


{{template "template-end.html" .}}
