{{template "template-start.html" .}}

    <span class="right"><wa-button href="rulesets/new" style="font-size: 10px;"><wa-icon name="plus"></wa-icon></wa-button></span>
    <h2>DNS Rule Sets</h2>
    <table border="1" cellspacing="0" cellpadding="0">
        <thead>
            <tr>
                <th></th>
                <th>Category</th>
                <th>RuleSet</th>
                <th>Description</th>
                <th>Schedule</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            {{range .model.RuleSets}}
            <tr>
                <td><a href="ruleset/{{.RuleSetId}}"><wa-icon name="pencil-square"></wa-icon></a></td>
                <td>{{.CategoryId}}</td>
                <td>{{if (eq .Source "")}}{{.RuleSetName}}{{else}}<a href="{{.Source}}" target="_blank">{{.RuleSetName}}</a>{{end}}</td>
                <td>{{.Description}}</td>
                <td>{{.Schedule}}</td>
                <td><wa-switch size="small" disabled {{if .Enabled}}checked{{end}}></wa-switch></td>
            </tr>
            {{end}}
        </tbody>
    </table>


{{template "template-end.html" .}}
