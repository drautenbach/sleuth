{{template "template-start.html" .}}

    <form method="post" action="{{.actionUrl}}">
        <div class="form-layout">
            <h3>{{.title}}</h3>
                <div class="form-group">
                    <label for="macaddress">MAC Address</label>
                    <input type="text" name="macaddress" value="{{.model.Device.MACAddress}}" {{if eq $.action "create"}}required{{else}}readonly{{end}} />
                </div>
                <div class="form-group">
                    <label for="devicename">Name</label>
                    <input type="text" name="devicename" value="{{.model.Device.DeviceName}}" required />
                </div>
                <div class="form-group">
                    <label for="username">Belongs to</label>
                    <wa-select name="username" value="{{.model.Device.UserName}}">
                        <wa-option value="">(Shared device)</wa-option>
                        {{range .model.Users}}
                            <wa-option value="{{.UserName}}">{{.FullName}} ({{.UserName}})</wa-option>
                        {{end}}
                    </wa-select>
                </div>
                <div class="form-group">
                    <label for="hostname">Host Name</label>
                    <input type="text" name="hostname" value="{{.model.Device.HostName}}" required />
                </div>
                <!---add block status-->
                <div class="form-group">
                    <label for="enabled">Enabled</label>
                    <wa-switch name="enabled" value="true"{{if .model.Device.Enabled}} checked{{end}}>Enabled</wa-switch>
                </div>
                
                <p><label class="error-message">{{.error}}</label></p>
                <div class="button-group">
                    <wa-button variant="primary" type="submit" name="action" value="{{.action}}"><wa-icon name="save"></wa-icon> {{if eq $.action "create"}}Create{{else}}Save{{end}}</wa-button>
                    <wa-button variant="default" href="../devices" outline><wa-icon name="arrow-left"></wa-icon> Cancel</wa-button>

                    {{if eq $.action "edit"}}
                        <span class="right">
                            <wa-button href="../devices/delete/{{.model.Device.MACAddress}}" variant="danger" outline><wa-icon name="xmark"></wa-icon> Delete</wa-button>
                        </span>
                    {{end}}
                </div>                    
        </div>
    </form>


{{template "template-end.html" .}}
