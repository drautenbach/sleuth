{{template "template-start.html" .}}

    <span class="right"><wa-icon-button name="person-plus" href="users/new"></wa-icon></span>
    <h2>Users</h2>
    <table border="1" cellspacing="0" cellpadding="0">
        <thead>
            <tr>
                <th>User</th>
                <th>Full Name</th>
                <th>Role</th>
                <th>Enabled</th>
            </tr>
        </thead>
        <tbody>
            {{range .model.Users}}
            <tr>
                <td><a href="user/{{.UserName}}"><wa-icon name="pencil-square"></wa-icon></a>&nbsp;{{.UserName}}</td>
                <td>{{.FullName}}</td>                   
                <td>{{.Role}}</td>                   
                <td>{{if .Enabled}}Yes{{else}}No{{end}}</td>                   
            </tr>
            {{end}}
        </tbody>
    </table>


{{template "template-end.html" .}}
