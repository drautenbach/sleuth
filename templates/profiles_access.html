{{template "template-start.html" .}}

    <form method="post">
        <div class="form-layout">
            <h3>{{.title}}</h3>
                <div class="form-group">
                    <label for="Name">Access Profile Name</label>
                    <input type="text" name="Name" value="{{.model.Profile.Name}}" {{if eq $.action "create"}}required{{else}}readonly{{end}} />
                </div>
                <div class="form-group">
                    <label for="AllowedDomains">Allowed Domains</label>
                   <wa-textarea name="AllowedDomains"
                                value="{{ join .model.Profile.AllowedDomains "\n" }}">
                    </wa-textarea>
                </div>  
                <div class="form-group">
                    <label for="BlockedDomains">Blocked Domains</label>
                   <wa-textarea name="BlockedDomains" value="{{ join .model.Profile.BlockedDomains "\n" }}">></wa-input>
                </div>                  

                
                <p><label class="error-message">{{.error}}</label></p>
                <div class="button-group">
                    <wa-button variant="primary" type="submit" name="action" value="{{.action}}"><wa-icon name="save"></wa-icon> {{if eq $.action "create"}}Create{{else}}Save{{end}}</wa-button>
                    <wa-button variant="default" href="../accessprofiles" outline><wa-icon name="arrow-left"></wa-icon> Cancel</wa-button>

                    {{if eq $.action "edit"}}
                        <span class="right">
                            <wa-button href="../accessprofiles/delete/{{.model.Profile.Name}}" variant="danger" outline><wa-icon name="xmark"></wa-icon> Delete</wa-button>
                        </span>
                    {{end}}
                </div>                    
        </div>
    </form>


{{template "template-end.html" .}}
