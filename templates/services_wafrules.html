{{template "template-start.html" .}}

    <form method="POST">
        <span class="right">
        <nobr>
            <wa-button size="xs" href="wafrules/new"><wa-icon name="plus"></wa-icon></wa-button>
        </nobr>
        </span>
    </form>
    
    <h2>{{.title}}</h2>
    <table border="1" cellspacing="0" cellpadding="0">
        <thead>
            <tr>
                <th></th>
                <th>ID</th>
                <th>Message</th>
                <th>Action</th>
                <th>Tags</th>
                <th>System</th>
            </tr>
        </thead>
        <tbody>
            {{range .model.Rules}}
            <tr>
                <td><a href="wafrule/{{.ID}}"><wa-icon name="pencil-square"></wa-icon></a></td>
                <td>{{.ID}}</td>
                <td>{{.Message}}</td>                
                <td>{{.Action}}</td>   
                <td>{{.Tags}}</td>
                <td><wa-switch class="disabled" {{if .IsSystem}}checked{{end}}></wa-switch></td>   
            </tr>
            {{end}}
        </tbody>
    </table>

    <p><label class="error-message">{{.model.error}}</label></p>


{{template "template-end.html" .}}
