{{template "template-start.html" .}}

    <form method="post">
        <div class="form-layout">
            <h3>{{.title}}</h3>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" name="username" value="{{.model.User.UserName}}" onkeyup="event.srcElement.value = event.srcElement.value.toLowerCase()" {{if eq $.action "create"}}required{{else}}readonly{{end}} />
                </div>
                <div class="form-group">
                    <label for="fullname">Full name</label>
                    <wa-input name="fullname" value="{{.model.User.FullName}}" ></wa-input>
                </div>
                <div class="form-group">
                    <label for="emailaddress">Email address</label>
                    <wa-input name="emailaddress" type="email" value="{{.model.User.EmailAddress}}"></wa-input>
                </div>
                <div class="form-group">
                    <label for="role">Role</label>
                    <wa-select name="role" value="{{.model.User.Role}}">
                        {{range .model.Roles}}
                            <wa-option value="{{.RoleName}}">{{.RoleName}}</wa-option>
                        {{end}}
                    <wa-select>
                </div>
                {{if eq $.action "edit"}}
                <div class="form-group">
                    <wa-switch name="enabled"{{if or .model.User.Enabled (eq $.action "create")}} checked{{end}}>Enabled</wa-switch>
                </div>
                {{end}}
                
                <p><label class="error-message">{{.error}}</label></p>
                <div class="button-group">
                    <wa-button variant="primary" type="submit" name="action" value="{{.action}}"><wa-icon name="save"></wa-icon> {{if eq $.action "create"}}Create{{else}}Save{{end}}</wa-button>
                    <wa-button variant="default" href="../users" outline><wa-icon name="arrow-left"></wa-icon> Cancel</wa-button>

                    {{if eq $.action "edit"}}
                        <span class="right">
                            <wa-button href="../users/reset/{{.model.User.UserName}}" variant="warning" outline><wa-icon name="key"></wa-icon> Reset Password</wa-button>
                            <wa-button href="../users/delete/{{.model.User.UserName}}" variant="danger" outline><wa-icon name="user-xmark"></wa-icon> Delete</wa-button>
                        </span>
                    {{end}}
                </div>                    
        </div>
    </form>

{{template "template-end.html" .}}
