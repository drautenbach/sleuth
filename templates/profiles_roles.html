{{template "template-start.html" .}}

    <span class="right"><wa-button href="roles/new" style="font-size: 10px;"><wa-icon name="plus"></wa-icon></wa-button></span>
    <h2>Roles</h2>
    <table border="1" cellspacing="0" cellpadding="0">
        <thead>
            <tr>
                <th>Role</th>
                <th>DNS Configuration</th>
                <th>DNS Device</th>
                <th>Dynamic Routing</th>
                <th>Admin</th>
            </tr>
        </thead>
        <tbody>
            {{range .model.Roles}}
            <tr>
                <td><a href="role/{{.RoleName}}"><wa-icon name="pencil-square"></wa-icon></a>&nbsp;{{.RoleName}}</td>
                <td>{{.DNSConfiguration}}</td>
                <td><wa-switch class="disabled" {{if .DNSPrependDeviceName}}checked{{end}}></wa-switch></td>   
                <td><wa-switch class="disabled" {{if .DynamicRouting}}checked{{end}}></wa-switch></td>   
                <td><wa-switch class="disabled" {{if .Admin}}checked{{end}}></wa-switch></td>   
            </tr>
            {{end}}
        </tbody>
    </table>



{{template "template-end.html" .}}
